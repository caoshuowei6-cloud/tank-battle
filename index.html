<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - Tank Battle</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎮 坦克大战</h1>
            <div class="stats">
                <div class="stat">
                    <span class="label">生命值:</span>
                    <span id="lives" class="value">❤️❤️❤️</span>
                </div>
                <div class="stat">
                    <span class="label">得分:</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="stat">
                    <span class="label">关卡:</span>
                    <span id="level" class="value">1</span>
                </div>
                <div class="stat">
                    <span class="label">剩余敌人:</span>
                    <span id="enemies-left" class="value">20</span>
                </div>
            </div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="520" height="520"></canvas>

            <div class="sidebar">
                <div class="controls-info">
                    <h3>🎯 操作说明</h3>
                    <div class="control-item">
                        <span class="key">W</span>
                        <span>向上移动</span>
                    </div>
                    <div class="control-item">
                        <span class="key">S</span>
                        <span>向下移动</span>
                    </div>
                    <div class="control-item">
                        <span class="key">A</span>
                        <span>向左移动</span>
                    </div>
                    <div class="control-item">
                        <span class="key">D</span>
                        <span>向右移动</span>
                    </div>
                    <div class="control-item">
                        <span class="key">空格</span>
                        <span>发射子弹</span>
                    </div>
                    <div class="control-item">
                        <span class="key">P</span>
                        <span>暂停游戏</span>
                    </div>
                </div>

                <div class="enemy-info">
                    <h3>👾 敌人图鉴</h3>
                    <div class="enemy-type">
                        <div class="enemy-icon basic"></div>
                        <span>普通坦克 (1分)</span>
                    </div>
                    <div class="enemy-type">
                        <div class="enemy-icon fast"></div>
                        <span>快速坦克 (2分)</span>
                    </div>
                    <div class="enemy-type">
                        <div class="enemy-icon heavy"></div>
                        <span>重型坦克 (3分)</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 开始界面 -->
        <div id="startScreen" class="overlay">
            <div class="overlay-content">
                <h1>🎮 坦克大战</h1>
                <p>经典街机游戏重制版</p>
                <button id="startBtn" class="btn btn-primary">开始游戏</button>
            </div>
        </div>

        <!-- 暂停界面 -->
        <div id="pauseScreen" class="overlay hidden">
            <div class="overlay-content">
                <h1>⏸️ 游戏暂停</h1>
                <p>按 P 键继续游戏</p>
                <button id="resumeBtn" class="btn btn-primary">继续游戏</button>
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="overlay hidden">
            <div class="overlay-content">
                <h1 id="gameOverTitle">💥 游戏结束</h1>
                <p id="gameOverReason">你的坦克被摧毁了！</p>
                <div class="final-score">
                    <span>最终得分:</span>
                    <span id="finalScore">0</span>
                </div>
                <button id="restartBtn" class="btn btn-primary">重新开始</button>
            </div>
        </div>

        <!-- 关卡完成界面 -->
        <div id="levelCompleteScreen" class="overlay hidden">
            <div class="overlay-content">
                <h1>🎉 关卡完成!</h1>
                <p>准备好迎接下一关了吗？</p>
                <button id="nextLevelBtn" class="btn btn-primary">下一关</button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
